<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Top bar ── -->
<header class="topbar">
  <div class="topbar__inner">
    <p class="topbar__brand"><span></span>Section Catalog</p>
    <div class="topbar__search-wrap">
      <span class="topbar__search-icon">⌕</span>
      <input
        id="js-search"
        class="search"
        type="search"
        placeholder="Search sections…"
        aria-label="Search sections"
        autocomplete="off"
      >
    </div>
    <p class="topbar__count"><span id="js-showing">0</span> of <span id="js-count">0</span></p>
  </div>
</header>

<!-- ── Filter tabs ── -->
<nav class="filter-bar" aria-label="Filter by category">
  <div class="filter-bar__inner" id="js-tabs" role="tablist"></div>
</nav>

<!-- ── Grid ── -->
<main class="main">
  <div id="js-grid" class="grid" aria-live="polite"></div>
  <p id="js-empty" class="empty" hidden>No sections match — try a different search or filter.</p>
</main>

<footer class="page-footer">
  <p>Add sections by editing <code>js/data.js</code> — see the template comment at the bottom of that file.</p>
</footer>

<!-- ── Modal ── -->
<div id="js-modal" class="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="js-modal-title">

    <div class="modal__head">
      <div>
        <h2 id="js-modal-title" class="modal__title"></h2>
        <p id="js-modal-sub" class="modal__sub"></p>
      </div>
      <button id="js-close" class="modal__close" type="button" aria-label="Close">✕</button>
    </div>

    <div class="modal__bar">
      <div class="code-tabs" role="tablist">
        <button id="js-tab-html" class="code-tab is-active" type="button" role="tab" aria-selected="true">HTML</button>
        <button id="js-tab-css"  class="code-tab"           type="button" role="tab" aria-selected="false">CSS</button>
      </div>
      <div class="modal__actions">
        <button id="js-preview" class="btn-preview" type="button">Live preview ↗</button>
        <button id="js-copy"    class="btn-copy"    type="button">Copy</button>
      </div>
    </div>

    <pre class="code-pre"><code id="js-code"></code></pre>
  </div>
</div>

<script src="js/data.js"></script>
<script>
(function () {

  /* ── state ── */
  var activeCategory = 'all';
  var activeQuery    = '';
  var activeSection  = null;
  var activeTab      = 'html';
  var lastCard       = null;

  /* ── refs ── */
  var grid      = document.getElementById('js-grid');
  var empty     = document.getElementById('js-empty');
  var countEl   = document.getElementById('js-count');
  var showingEl = document.getElementById('js-showing');
  var searchEl  = document.getElementById('js-search');
  var tabsEl    = document.getElementById('js-tabs');

  var overlay    = document.getElementById('js-modal');
  var modalTitle = document.getElementById('js-modal-title');
  var modalSub   = document.getElementById('js-modal-sub');
  var codeEl     = document.getElementById('js-code');
  var tabHtml    = document.getElementById('js-tab-html');
  var tabCss     = document.getElementById('js-tab-css');
  var copyBtn    = document.getElementById('js-copy');
  var previewBtn = document.getElementById('js-preview');
  var closeBtn   = document.getElementById('js-close');

  /* ── category icons map ── */
  var icons = {
    'Navbar':    '🧭',
    'Hero':      '🖼️',
    'Pricing':   '💳',
    'Cards':     '🃏',
    'Footer':    '📋',
    'Marketing': '📣',
  };

  /* ── filter ── */
  function filtered() {
    var q = activeQuery.trim().toLowerCase();
    return SECTIONS.filter(function (s) {
      var catOk = activeCategory === 'all' || s.category === activeCategory;
      if (!catOk) return false;
      if (!q) return true;
      return (
        s.name.toLowerCase().indexOf(q) !== -1 ||
        s.code.toLowerCase().indexOf(q) !== -1 ||
        s.category.toLowerCase().indexOf(q) !== -1 ||
        (s.tags && s.tags.join(' ').indexOf(q) !== -1)
      );
    });
  }

  /* ── tabs ── */
  function buildTabs() {
    var cats = ['all'];
    SECTIONS.forEach(function (s) {
      if (cats.indexOf(s.category) === -1) cats.push(s.category);
    });
    tabsEl.innerHTML = '';
    cats.forEach(function (cat) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tab' + (cat === activeCategory ? ' is-active' : '');
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', cat === activeCategory ? 'true' : 'false');
      btn.textContent = cat === 'all' ? 'All' : cat;
      btn.addEventListener('click', function () {
        activeCategory = cat;
        buildTabs();
        renderGrid();
      });
      tabsEl.appendChild(btn);
    });
  }

  /* ── thumbnail html ── */
  function thumbHtml(section) {
    if (section.thumbnail) {
      return '<img src="' + section.thumbnail + '" alt="' + section.name + ' preview" loading="lazy">';
    }
    var icon = icons[section.category] || '📦';
    return (
      '<div class="card__placeholder">' +
        '<div class="card__placeholder-icon">' + icon + '</div>' +
        '<span class="card__placeholder-label">No screenshot yet</span>' +
      '</div>'
    );
  }

  /* ── grid ── */
  function renderGrid() {
    var items = filtered();
    countEl.textContent   = SECTIONS.length;
    showingEl.textContent = items.length;
    grid.innerHTML = '';
    empty.hidden = items.length > 0;

    items.forEach(function (section) {
      var card = document.createElement('div');
      card.className = 'card';

      card.innerHTML =
        '<div class="card__thumb">' +
          thumbHtml(section) +
          '<span class="card__badge">' + section.category + '</span>' +
        '</div>' +
        '<div class="card__body">' +
          '<div class="card__meta">' +
            '<span class="card__code">' + section.code + '</span>' +
            '<span class="card__name">' + section.name + '</span>' +
          '</div>' +
          '<div class="card__actions">' +
            '<button type="button" class="card__btn card__btn--code">View code</button>' +
            '<button type="button" class="card__btn card__btn--preview">Preview ↗</button>' +
          '</div>' +
        '</div>';

      var codeBtn    = card.querySelector('.card__btn--code');
      var prevBtn    = card.querySelector('.card__btn--preview');

      codeBtn.addEventListener('click', function () { openModal(section, codeBtn); });
      prevBtn.addEventListener('click', function () { openPreview(section); });

      grid.appendChild(card);
    });
  }

  /* ── live preview ── */
  function buildDoc(section) {
    return '<!DOCTYPE html><html lang="en"><head>' +
      '<meta charset="UTF-8">' +
      '<meta name="viewport" content="width=device-width,initial-scale=1">' +
      '<title>' + section.name + ' — preview</title>' +
      '<style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;background:#fafafa}' +
      section.css + '</style></head><body>' +
      section.html + '</body></html>';
  }

  function openPreview(section) {
    var w = window.open('', '_blank');
    if (!w) { alert('Allow popups for this site and try again.'); return; }
    w.document.open();
    w.document.write(buildDoc(section));
    w.document.close();
  }

  /* ── modal ── */
  function openModal(section, trigger) {
    activeSection = section;
    activeTab     = 'html';
    lastCard      = trigger || null;
    modalTitle.textContent = section.name;
    modalSub.textContent   = section.code + ' · ' + section.category;
    setTab('html');
    overlay.hidden = false;
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    overlay.hidden = true;
    document.body.style.overflow = '';
    if (lastCard) lastCard.focus();
  }

  function setTab(tab) {
    activeTab = tab;
    var isHtml = tab === 'html';
    tabHtml.classList.toggle('is-active', isHtml);
    tabCss.classList.toggle('is-active',  !isHtml);
    tabHtml.setAttribute('aria-selected', isHtml ? 'true' : 'false');
    tabCss.setAttribute('aria-selected',  isHtml ? 'false' : 'true');
    codeEl.textContent = isHtml ? activeSection.html : activeSection.css;
    resetCopy();
  }

  function resetCopy() {
    copyBtn.textContent = 'Copy';
    copyBtn.classList.remove('is-done');
  }

  function doCopy() {
    var text = activeTab === 'html' ? activeSection.html : activeSection.css;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        copyBtn.textContent = 'Copied ✓';
        copyBtn.classList.add('is-done');
        setTimeout(resetCopy, 1800);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyBtn.textContent = 'Copied ✓';
      copyBtn.classList.add('is-done');
      setTimeout(resetCopy, 1800);
    }
  }

  /* ── events ── */
  tabHtml.addEventListener('click', function () { setTab('html'); });
  tabCss.addEventListener('click',  function () { setTab('css'); });
  copyBtn.addEventListener('click', doCopy);
  previewBtn.addEventListener('click', function () { if (activeSection) openPreview(activeSection); });
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !overlay.hidden) closeModal(); });
  searchEl.addEventListener('input', function () { activeQuery = searchEl.value; renderGrid(); });

  /* ── init ── */
  buildTabs();
  renderGrid();

})();
</script>
</body>
</html>
